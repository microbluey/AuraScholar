  <line x1="244" y1="410" x2="274" y2="410" stroke="#2b383b"/>
  <circle cx="259" cy="432" r="7" fill="#f3c969"/><circle cx="259" cy="459" r="7" fill="#72c4b6"/><circle cx="259" cy="486" r="7" fill="#9a83d1"/><circle cx="259" cy="513" r="7" fill="#dd867a"/>

  <!-- PDF page -->
  <rect x="340" y="106" width="712" height="858" rx="7" fill="#fffefa" filter="url(#pageShadow)"/>
  <text x="404" y="169" class="paper" font-size="23" font-weight="700" fill="#1b201f">Attention Is All You Need</text>
  <text x="404" y="198" class="paper" font-size="10" fill="#555d5a">Ashish Vaswani · Noam Shazeer · Niki Parmar · Jakob Uszkoreit</text>
  <line x1="404" y1="220" x2="988" y2="220" stroke="#d4d7d3"/>
  <text x="404" y="250" class="paper" font-size="14" font-weight="700" fill="#262c2a">3.2.1 Scaled Dot-Product Attention</text>
  <text x="404" y="278" class="paper" font-size="10" fill="#4f5653">We call our particular attention “Scaled Dot-Product Attention”. The input consists of</text>
  <text x="404" y="295" class="paper" font-size="10" fill="#4f5653">queries and keys of dimension dₖ, and values of dimension dᵥ. We compute the dot products</text>
  <rect x="401" y="304" width="565" height="20" rx="2" fill="#f4d99b" opacity="0.65"/>
  <text x="404" y="319" class="paper" font-size="10" fill="#4f5653">of the query with all keys, divide each by √dₖ, and apply a softmax function.</text>

  <!-- paper figure -->
  <rect x="442" y="360" width="508" height="296" rx="5" fill="#f4f6f4" stroke="#d9ddda"/>
  <text x="696" y="389" class="paper" font-size="11" font-weight="700" fill="#39413e" text-anchor="middle">Multi-Head Attention</text>
  <rect x="593" y="420" width="206" height="42" rx="5" fill="#dce9e5" stroke="#8fb8af"/>
  <text x="696" y="446" class="ui" font-size="11" font-weight="650" fill="#365f57" text-anchor="middle">Scaled Dot-Product Attention</text>
  <rect x="486" y="504" width="118" height="42" rx="5" fill="#eeeaf8" stroke="#b8a9d8"/><text x="545" y="530" class="ui" font-size="10" fill="#685391" text-anchor="middle">Linear Q</text>
  <rect x="637" y="504" width="118" height="42" rx="5" fill="#eeeaf8" stroke="#b8a9d8"/><text x="696" y="530" class="ui" font-size="10" fill="#685391" text-anchor="middle">Linear K</text>
  <rect x="788" y="504" width="118" height="42" rx="5" fill="#eeeaf8" stroke="#b8a9d8"/><text x="847" y="530" class="ui" font-size="10" fill="#685391" text-anchor="middle">Linear V</text>
  <path d="M545 504v-22h151v-20M696 504v-42M847 504v-22H696v-20" fill="none" stroke="#7c8a86" stroke-width="1.4"/>
  <rect x="593" y="584" width="206" height="36" rx="5" fill="#fff" stroke="#c8ceca"/><text x="696" y="607" class="ui" font-size="10" fill="#515c58" text-anchor="middle">Input representations</text>
  <path d="M545 584v-38M696 584v-38M847 584v-38" stroke="#7c8a86" stroke-width="1.4"/>
  <text x="696" y="645" class="paper" font-size="9" fill="#6d7471" text-anchor="middle">Figure 2: Multi-head attention allows the model to attend to different subspaces.</text>

  <text x="404" y="706" class="paper" font-size="10" fill="#4f5653">In practice, we compute the attention function on a set of queries simultaneously, packed</text>
  <text x="404" y="723" class="paper" font-size="10" fill="#4f5653">together into a matrix Q. The keys and values are also packed together into matrices K and V.</text>
  <rect x="401" y="731" width="528" height="20" rx="2" fill="#b9ddd5" opacity="0.7"/>
  <text x="404" y="746" class="paper" font-size="10" fill="#4f5653">The matrix of outputs is computed as: Attention(Q,K,V)=softmax(QKᵀ/√dₖ)V.</text>
  <text x="404" y="790" class="paper" font-size="14" font-weight="700" fill="#262c2a">3.2.2 Multi-Head Attention</text>
  <text x="404" y="818" class="paper" font-size="10" fill="#4f5653">Instead of performing a single attention function, we found it beneficial to linearly project</text>
  <text x="404" y="835" class="paper" font-size="10" fill="#4f5653">the queries, keys and values h times with different, learned linear projections.</text>

  <!-- annotation pin on page -->
