  <g class="ui" font-size="9" fill="#667773">
    <rect x="30" y="120" width="112" height="145" rx="3" fill="#d9dcd7"/><rect x="39" y="133" width="94" height="118" fill="#fafafa"/>
    <text x="155" y="194">5</text>
    <rect x="30" y="284" width="112" height="145" rx="3" fill="#d9dcd7"/><rect x="39" y="297" width="94" height="118" fill="#fafafa"/>
    <line x1="49" y1="315" x2="122" y2="315" stroke="#5d6260"/><line x1="49" y1="324" x2="113" y2="324" stroke="#a6aaa7"/>
