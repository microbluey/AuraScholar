  <rect x="1204" y="184" width="370" height="40" rx="12" fill="#191c31" stroke="#30344f"/>
  <circle cx="1226" cy="204" r="6" fill="#8072f6"/>
  <text x="1240" y="208" class="ui" font-size="11" fill="#bdcbc7">deepseek-chat · 已生成</text>
  <text x="1552" y="208" class="ui" font-size="10" fill="#77c8ba" text-anchor="end">重新生成</text>

  <text x="1204" y="262" class="ui panelTitle">一句话结论</text>
  <rect x="1204" y="278" width="370" height="98" rx="15" fill="url(#aiPanel)" stroke="#343852"/>
  <rect x="1204" y="278" width="3" height="98" rx="2" fill="#8a7cf7"/>
  <text x="1222" y="305" class="ui body">Transformer 用多头自注意力替代循环结构，</text>
  <text x="1222" y="326" class="ui body">把长距离依赖建模与大规模并行训练统一起来，</text>
  <text x="1222" y="347" class="ui body">成为后续基础模型的核心架构。</text>

  <text x="1204" y="420" class="ui panelTitle">本页重点</text>
  <circle cx="1212" cy="452" r="5" fill="#69b8aa"/><text x="1228" y="456" class="ui body">缩放因子 √dₖ 防止点积进入 softmax 饱和区。</text>
  <circle cx="1212" cy="489" r="5" fill="#69b8aa"/><text x="1228" y="493" class="ui body">多头机制让模型同时关注不同表示子空间。</text>
  <circle cx="1212" cy="526" r="5" fill="#c48632"/><text x="1228" y="530" class="ui body">阅读时注意 Q、K、V 的维度与实现复杂度。</text>

  <line x1="1204" y1="565" x2="1574" y2="565" stroke="#243033"/>
  <text x="1204" y="604" class="ui panelTitle">可复用素材</text>
  <rect x="1204" y="622" width="370" height="134" rx="15" fill="#171a2d" stroke="#30344f"/>
  <text x="1222" y="649" class="ui" font-size="10" font-weight="700" fill="#d3aa63">METHOD NOTE</text>
  <text x="1222" y="677" class="ui body">“多头注意力并非简单重复同一注意力计算，</text>
  <text x="1222" y="698" class="ui body">而是通过独立投影学习互补的关系子空间。”</text>
  <text x="1222" y="732" class="ui" font-size="10" fill="#77c8ba">已链接到第 7 页 · 复制</text>
  <text x="1554" y="732" class="ui" font-size="10" fill="#77c8ba" text-anchor="end">加入写作素材 →</text>

